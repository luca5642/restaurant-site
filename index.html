<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お気に入りレストラン</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>お気に入りレストラン</h1>
        <div class="filters">
            <input type="text" id="search" placeholder="店名・場所で検索...">
            <select id="genre-filter">
                <option value="">すべてのジャンル</option>
            </select>
        </div>
    </header>
    <main>
        <div id="loading">読み込み中...</div>
        <div id="cards" class="cards-grid"></div>
        <div id="empty" class="empty" style="display:none">該当するお店が見つかりませんでした</div>
    </main>
    <script src="script.js"></script>
</body>
</html>
